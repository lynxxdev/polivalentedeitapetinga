<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colégio Polivalente de Itapetinga — 50 Anos de Excelência</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #060b18; font-family: 'Lato', sans-serif; }
#site-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 1; opacity: 0; pointer-events: none; background: #060b18; transition: opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
#site-frame.revealed { opacity: 1; pointer-events: auto; }
#loader { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #060b18; }
#loader.shrink { animation: loader-shrink 0.9s cubic-bezier(0.77, 0, 0.175, 1) forwards; }
@keyframes loader-shrink { 0% { opacity: 1; transform: scale(1); } 40% { opacity: 1; transform: scale(0.96); } 100% { opacity: 0; transform: scale(0.88); pointer-events: none; } }
#loader-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
.bg-glow { position: absolute; inset: 0; pointer-events: none; z-index: 2; background: radial-gradient(ellipse 90% 70% at 50% 45%, rgba(200,153,58,0.13) 0%, transparent 60%), radial-gradient(ellipse 120% 100% at 50% 100%, rgba(37,99,235,0.07) 0%, transparent 50%); animation: glow-breathe 6s ease-in-out infinite; }
@keyframes glow-breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
.loader-center { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 0; transform: translateY(-16px); }
.ring-wrap { position: relative; width: 280px; height: 280px; margin-bottom: 44px; }
.ring-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
.rk-track { fill: none; stroke: rgba(200,153,58,0.07); stroke-width: 2.5; }
.rk-prog { fill: none; stroke: url(#grdMain); stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 816; stroke-dashoffset: 816; transition: stroke-dashoffset 0.08s linear; filter: url(#glow-prog); }
.rk-prog-blur { fill: none; stroke: url(#grdBlur); stroke-width: 12; stroke-linecap: round; stroke-dasharray: 816; stroke-dashoffset: 816; transition: stroke-dashoffset 0.08s linear; opacity: 0.18; filter: blur(4px); }
.rk-orbit-out { fill: none; stroke: rgba(200,153,58,0.18); stroke-width: 1; stroke-dasharray: 5 18; animation: spin-cw 24s linear infinite; transform-origin: 50% 50%; }
.rk-orbit-in { fill: none; stroke: rgba(96,165,250,0.1); stroke-width: 0.8; stroke-dasharray: 3 24; animation: spin-ccw 38s linear infinite; transform-origin: 50% 50%; }
.rk-deco-out { fill: none; stroke: rgba(200,153,58,0.05); stroke-width: 1; stroke-dasharray: 1 6; }
@keyframes spin-cw  { to { transform: rotate(360deg);  } }
@keyframes spin-ccw { to { transform: rotate(-360deg); } }
.rk-tip { r: 5; fill: #e8c06a; filter: url(#glow-tip); opacity: 0; transition: opacity 0.3s ease; }
.rk-tip.visible { opacity: 1; }
.tick-mark { stroke: rgba(200,153,58,0.22); stroke-width: 1; }
.tick-mark.major { stroke: rgba(200,153,58,0.45); stroke-width: 1.5; }
.ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; }
.center-orb { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, rgba(200,153,58,0.12) 0%, transparent 70%); animation: orb-pulse 3s ease-in-out infinite; pointer-events: none; }
@keyframes orb-pulse { 0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1);}50%{opacity:0.5;transform:translate(-50%,-50%) scale(1.2);} }
.crest-letters { font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 900; letter-spacing: 0.22em; line-height: 1; background: linear-gradient(160deg, #fff 0%, #e8c06a 45%, #c8993a 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: shimmer 3s linear infinite; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6)); }
@keyframes shimmer { to { background-position: 200% center; } }
.crest-sub { font-family: 'Cinzel', serif; font-size: 0.5rem; font-weight: 600; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(200,153,58,0.55); white-space: nowrap; }
.ring-pct { font-family: 'Cinzel', serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.2em; color: rgba(200,153,58,0.6); margin-top: 2px; transition: color 0.3s; }
.loader-school-name { font-family: 'Cinzel', serif; font-size: clamp(1.25rem, 4vw, 2.1rem); font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; text-align: center; line-height: 1.45; margin-bottom: 12px; }
.loader-school-name .line { display: block; overflow: hidden; }
.loader-school-name .line span { display: inline-block; background: linear-gradient(135deg, #fff 0%, #e8c06a 55%, #c8993a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; transform: translateY(110%); opacity: 0; transition: transform 0.9s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.7s ease; }
.loader-school-name.revealed .line span { transform: translateY(0); opacity: 1; }
.loader-school-name .line:nth-child(1) span { transition-delay: 0.15s; }
.loader-school-name .line:nth-child(2) span { transition-delay: 0.32s; }
.deco-line { display: flex; align-items: center; gap: 14px; margin: 16px 0 20px; opacity: 0; transform: scaleX(0); transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1); transition-delay: 0.5s; }
.deco-line.revealed { opacity: 1; transform: scaleX(1); }
.deco-line-seg { flex: 1; max-width: 110px; height: 1px; background: linear-gradient(to right, transparent, rgba(200,153,58,0.45), transparent); }
.deco-line i { font-size: 0.55rem; color: #c8993a; animation: twinkle 2.2s ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.75);} }
.loader-tagline { font-family: 'Cormorant Garamond', serif; font-size: clamp(0.9rem, 2.5vw, 1.15rem); font-style: italic; font-weight: 300; color: rgba(200,153,58,0.65); letter-spacing: 0.07em; text-align: center; opacity: 0; transform: translateY(18px); transition: all 0.8s ease; transition-delay: 0.7s; margin-bottom: 44px; }
.loader-tagline.revealed { opacity: 1; transform: translateY(0); }
.progress-container { width: clamp(260px, 50vw, 400px); opacity: 0; transform: translateY(24px); transition: all 0.6s ease; transition-delay: 0.9s; }
.progress-container.revealed { opacity: 1; transform: translateY(0); }
.progress-track { width: 100%; height: 2px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: visible; position: relative; margin-bottom: 14px; }
.progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #665221 0%, gold 50%, #665221 100%); background-size: 300% 100%; border-radius: 2px; position: relative; animation: bar-shimmer 2s linear infinite; box-shadow: 0 0 8px rgba(200,153,58,0.5); }
@keyframes bar-shimmer { 0%{background-position:100% 0;}100%{background-position:-200% 0;} }
.progress-fill::after { content: ''; position: absolute; right: -2px; top: -4px; width: 9px; height: 9px; border-radius: 50%; background: gold; box-shadow: 0 0 12px 3px gold; animation: dot-pulse 1.4s ease-in-out infinite; }
@keyframes dot-pulse { 0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.3);opacity:0.75;} }
.progress-info { display: flex; justify-content: space-between; align-items: center; }
.progress-pct { font-family: 'Cinzel', serif; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.1em; color: gold; }
.progress-msg { font-family: 'Cormorant Garamond', serif; font-style: italic; color: rgba(255,255,255,0.38); font-size: 0.78rem; transition: all 0.3s ease; }
@media (max-width: 768px) { .ring-wrap { width: 220px; height: 220px; } .crest-letters { font-size: 1.55rem; } .year-range { bottom: 30px; left: 30px; font-size: 0.75rem; } }
@media (max-width: 480px) { .ring-wrap { width: 180px; height: 180px; margin-bottom: 32px; } .crest-letters { font-size: 1.25rem; letter-spacing: 0.18em; } .loader-school-name { font-size: 1.1rem; } .loader-tagline { margin-bottom: 36px; } .progress-container { width: 240px; } }
.year-range { position: absolute; bottom: -60px; left: 100px; font-family: 'Cinzel', serif; font-size: 0.9rem; color: gold; letter-spacing: 0.2em; opacity: 0; transition: opacity 1s ease; transition-delay: 1.4s; }
.year-range.revealed { opacity: 1; }
.year-range span { color: gold; font-weight: 700; }
</style>
</head>
<body>
<iframe id="site-frame" title="Colégio Polivalente de Itapetinga" src="plvnt.html" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-top-navigation" loading="eager"></iframe>
<div id="loader">
<canvas id="loader-canvas"></canvas>
<div class="bg-glow"></div>
<div class="loader-center">
<div class="ring-wrap">
<div class="center-orb"></div>
<svg class="ring-svg" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="grdMain" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="gold"/><stop offset="40%" stop-color="gold"/><stop offset="70%" stop-color="gold"/><stop offset="100%" stop-color="gold"/></linearGradient>
<linearGradient id="grdBlur" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="gold"/><stop offset="50%" stop-color="gold"/><stop offset="100%" stop-color="gold"/></linearGradient>
<filter id="glow-prog" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="glow-tip" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<circle class="rk-deco-out" cx="140" cy="140" r="138"/>
<circle class="rk-orbit-out" cx="140" cy="140" r="133"/>
<circle class="rk-orbit-in" cx="140" cy="140" r="124"/>
<g id="ticks"></g>
<circle class="rk-track" cx="140" cy="140" r="130" transform="rotate(-90 140 140)"/>
<circle class="rk-prog-blur" cx="140" cy="140" r="130" id="ringBlur" transform="rotate(-90 140 140)"/>
<circle class="rk-prog" cx="140" cy="140" r="130" id="ringProg" transform="rotate(-90 140 140)"/>
<circle class="rk-tip" id="ringTip" cx="140" cy="10"/>
</svg>
<div class="ring-center">
<div class="crest-letters">C.P.I</div>
<span class="crest-sub">Est. 1974</span>
<div class="ring-pct" id="ringPctText">0%</div>
</div>
</div>
<div class="loader-school-name" id="schoolName"><span class="line"><span>Colégio Polivalente</span></span><span class="line"><span>de Itapetinga</span></span></div>
<div class="deco-line" id="decoLine"><div class="deco-line-seg"></div><i class="fas fa-star"></i><div class="deco-line-seg"></div></div>
<div class="loader-tagline" id="tagline">Educando gerações com dedicação, tradição e carinho</div>
<div class="progress-container" id="progressContainer">
<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-info"><span class="progress-pct" id="progressPct">0%</span><span class="progress-msg" id="progressMsg">Carregando site...</span></div>
</div>
<div class="year-range" id="yearRange"><span>1974</span> — <span>2026</span></div>
</div>
</div>
<script>
(function(){
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{const k=e.key.toLowerCase(),c=e.ctrlKey||e.metaKey;if((c&&(k==='u'||k==='s'))||k==='f12'||(c&&e.shiftKey&&['i','j','c'].includes(k)))e.preventDefault()});
(function(){const g=document.getElementById('ticks'),cx=140,cy=140,r1=117,r2m=112,r2n=114,total=60;for(let i=0;i<total;i++){const angle=(i/total)*2*Math.PI-Math.PI/2,isMajor=i%(total/6)===0,x1=cx+r1*Math.cos(angle),y1=cy+r1*Math.sin(angle),x2=cx+(isMajor?r2m:r2n)*Math.cos(angle),y2=cy+(isMajor?r2m:r2n)*Math.sin(angle),line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1',x1);line.setAttribute('y1',y1);line.setAttribute('x2',x2);line.setAttribute('y2',y2);line.setAttribute('class',isMajor?'tick-mark major':'tick-mark');g.appendChild(line)}})();
const canvas=document.getElementById('loader-canvas'),ctx=canvas.getContext('2d');let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
function rand(a,b){return Math.random()*(b-a)+a}
class Particle{constructor(){this.reset(true)}reset(initial){this.x=rand(0,W);this.y=initial?rand(0,H):rand(H,H+80);this.vx=rand(-0.25,0.25);this.vy=rand(-0.7,-0.18);this.r=rand(0.4,1.8);this.a=rand(0.25,0.85);this.fade=rand(0.001,0.0025);this.phi=rand(0,Math.PI*2)}update(){this.x+=this.vx;this.y+=this.vy;this.phi+=0.018;this.a-=this.fade;if(this.a<=0||this.y<-40)this.reset(false)}draw(){const a=this.a*(0.8+0.2*Math.sin(this.phi));ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,153,58,${a.toFixed(3)})`;ctx.shadowBlur=5;ctx.shadowColor=`rgba(200,153,58,${(a*0.4).toFixed(3)})`;ctx.fill();ctx.shadowBlur=0}}
const shoots=[];
function tryShoot(){if(shoots.length<2&&Math.random()<0.003)shoots.push({x:rand(0,W*.65),y:rand(0,H*.4),len:rand(80,180),spd:rand(6,11),ang:Math.PI/4+rand(-.25,.25),a:1});}
const parts=Array.from({length:70},()=>new Particle());
function animParts(){ctx.clearRect(0,0,W,H);parts.forEach(p=>{p.update();p.draw();});tryShoot();for(let i=shoots.length-1;i>=0;i--){const s=shoots[i],tx=s.x-Math.cos(s.ang)*s.len,ty=s.y-Math.sin(s.ang)*s.len,gr=ctx.createLinearGradient(tx,ty,s.x,s.y);gr.addColorStop(0,`rgba(200,153,58,0)`);gr.addColorStop(1,`rgba(232,192,106,${s.a.toFixed(3)})`);ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(s.x,s.y);ctx.strokeStyle=gr;ctx.lineWidth=1.4;ctx.stroke();s.x+=Math.cos(s.ang)*s.spd;s.y+=Math.sin(s.ang)*s.spd;s.a-=0.016;if(s.a<=0.02)shoots.splice(i,1);}for(let i=0;i<parts.length;i++){let c=0;for(let j=i+1;j<parts.length&&c<3;j++){const dx=parts[i].x-parts[j].x,dy=parts[i].y-parts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<90){ctx.beginPath();ctx.moveTo(parts[i].x,parts[i].y);ctx.lineTo(parts[j].x,parts[j].y);ctx.strokeStyle=`rgba(200,153,58,${((1-d/90)*0.12).toFixed(3)})`;ctx.lineWidth=0.4;ctx.stroke();c++;}}}requestAnimationFrame(animParts);}
window.addEventListener('resize',resize);
resize();
requestAnimationFrame(animParts);
const CIRC=2*Math.PI*130,ringProg=document.getElementById('ringProg'),ringBlur=document.getElementById('ringBlur'),ringTip=document.getElementById('ringTip'),progFill=document.getElementById('progressFill'),progPct=document.getElementById('progressPct'),progMsg=document.getElementById('progressMsg'),ringPctTxt=document.getElementById('ringPctText');ringProg.style.strokeDasharray=CIRC;ringProg.style.strokeDashoffset=CIRC;ringBlur.style.strokeDasharray=CIRC;ringBlur.style.strokeDashoffset=CIRC;
const MESSAGES=[{at:0,text:'Carregando site...'}];
let curPct=0,tgtPct=0,prevMsgIdx=0,rafId=null;
function updateProg(){const diff=tgtPct-curPct;if(Math.abs(diff)>0.05){curPct+=diff*0.05;const display=Math.round(curPct),offset=CIRC-(CIRC*curPct/100);progFill.style.width=curPct+'%';progPct.textContent=display+'%';ringProg.style.strokeDashoffset=offset;ringBlur.style.strokeDashoffset=offset;ringPctTxt.textContent=display+'%';const ang=((curPct/100)*2*Math.PI)-Math.PI/2,tipX=140+130*Math.cos(ang),tipY=140+130*Math.sin(ang);ringTip.setAttribute('cx',tipX);ringTip.setAttribute('cy',tipY);if(curPct>1)ringTip.classList.add('visible');const mi=[...MESSAGES].reverse().findIndex(m=>curPct>=m.at),idx=MESSAGES.length-1-mi;if(idx!==prevMsgIdx){prevMsgIdx=idx;progMsg.style.opacity='0';setTimeout(()=>{progMsg.textContent=MESSAGES[idx].text;progMsg.style.opacity='1';},200);}rafId=requestAnimationFrame(updateProg);}else{curPct=tgtPct;}}
function setTarget(pct,delay=0){setTimeout(()=>{tgtPct=pct;if(!rafId)updateProg();rafId=null;},delay);}
function revealElements(){setTimeout(()=>document.getElementById('schoolName').classList.add('revealed'),200);setTimeout(()=>document.getElementById('decoLine').classList.add('revealed'),480);setTimeout(()=>document.getElementById('tagline').classList.add('revealed'),720);setTimeout(()=>document.getElementById('progressContainer').classList.add('revealed'),1000);setTimeout(()=>document.getElementById('yearRange').classList.add('revealed'),1000);}
const loader=document.getElementById('loader'),siteFrame=document.getElementById('site-frame');
let iframeLoaded=false,minTimeOk=false;
const MIN_TIME=3000;
setTimeout(()=>{revealElements();setTarget(20,300);setTarget(40,900);setTarget(62,1700);setTarget(80,2400);setTarget(100,3100);},200);
siteFrame.addEventListener('load',()=>{iframeLoaded=true;checkDone();});
setTimeout(()=>{if(!iframeLoaded){iframeLoaded=true;checkDone();}},3300);
setTimeout(()=>{minTimeOk=true;checkDone();},MIN_TIME);
function checkDone(){if(!iframeLoaded||!minTimeOk||loader.dataset.exiting)return;loader.dataset.exiting='1';setTarget(100,0);setTimeout(()=>{siteFrame.classList.add('revealed');loader.classList.add('shrink');setTimeout(()=>{loader.style.display='none';},950);},700);}
})();
</script>
</body>
</html>
